<app-navbar></app-navbar>
<div class="page-container">
  <div class="page-header"><h2>📊 Todas las reservas</h2></div>
  <div class="loading" *ngIf="loading">Cargando...</div>
  <div class="empty" *ngIf="!loading && reservas.length === 0">No hay reservas en el sistema.</div>
  <div class="table-container" *ngIf="!loading && reservas.length > 0">
    <table>
      <thead>
        <tr>
          <th>Parqueadero</th>
          <th>Conductor</th>
          <th>Desde</th>
          <th>Hasta</th>
          <th>Total</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of reservas">
          <td>{{ r.parqueaderoNombre }}</td>
          <td>{{ r.conductorNombre }}</td>
          <td>{{ r.fechaInicio | date:'dd/MM/yy HH:mm' }}</td>
          <td>{{ r.fechaFin | date:'dd/MM/yy HH:mm' }}</td>
          <td>${{ r.totalAPagar }}</td>
          <td><span class="estado-badge" [ngClass]="getEstadoClass(r.estado)">{{ r.estado }}</span></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
